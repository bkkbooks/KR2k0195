body:
  text: 九江志神泉廬山錦綉峰下有神泉宋紹興間皇甫履隱斯山高宗名其居曰清虛菴光宗在東宮問履所乏履曰但水差遠光宗特書神泉二字履持歸菴傍穿小井方施參鍾而泉遂出故名湓城青湓山有井形如盆因號湓水城曰湓城浦曰湓浦江州故有湓江匡廬匡谷先生姓匡名谷商周之際遯世隱居廬於廬山故號匡廬泉穴東興人家曾以木甑沉井中乃流出連樊溪甘渚得之此泉穴相通也又曰五章山絕嵓嶮峭有密蜂依之為房其形如笠望者皆懸磴數丈然後得至其所矣石人虛谷東英巨山巖內有石人坐磐石上體上塵穢則興風濕潤則致雨晴日便舉體鮮潔朗然玉淨
